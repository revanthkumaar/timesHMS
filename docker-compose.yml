version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hms
    ports: ['5432:5432']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: .env.example
    ports: ['3000:3000']
    depends_on: [postgres, redis]
